<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC 2026 Sweepstake</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf9f6;
  --white: #ffffff;
  --text: #1a1a1a;
  --text2: #666666;
  --text3: #999999;
  --border: #e0e0e0;
  --border-light: #f0f0f0;
  --accent: #326891;
  --accent2: #c13b2a;
  --green: #1a7a2e;
  --green-bg: #e8f5e9;
  --red-bg: #fce8e6;
  --gold: #b8860b;
  --blue-bg: #e3f2fd;
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'Inter', -apple-system, system-ui, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

/* Header */
.header { max-width: 720px; margin: 0 auto; padding: 48px 20px 32px; text-align: center; border-bottom: 1px solid var(--text); }
.header h1 { font-family: var(--serif); font-size: 2.8em; font-weight: 700; letter-spacing: -0.02em; color: var(--text); margin-bottom: 4px; }
.header p { font-size: 0.85em; color: var(--text2); letter-spacing: 0.05em; text-transform: uppercase; }

/* Nav */
.nav { max-width: 720px; margin: 0 auto; padding: 0 20px; display: flex; border-bottom: 1px solid var(--border); }
.nav-item { padding: 14px 0; margin-right: 28px; font-size: 0.85em; font-weight: 500; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; letter-spacing: 0.01em; }
.nav-item:hover { color: var(--text); }
.nav-item.active { color: var(--text); border-bottom-color: var(--text); }

/* Container */
.container { max-width: 720px; margin: 0 auto; padding: 0 20px; }

/* Sections */
.section { display: none; padding: 32px 0 60px; }
.section.active { display: block; }
h2 { font-family: var(--serif); font-size: 1.6em; font-weight: 700; margin-bottom: 4px; }
h3 { font-family: var(--serif); font-size: 1.15em; font-weight: 700; margin-bottom: 16px; }
.section-sub { font-size: 0.85em; color: var(--text2); margin-bottom: 24px; }

/* Leaderboard */
.lb-table { width: 100%; border-collapse: collapse; }
.lb-table th { font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); font-weight: 500; padding: 0 0 8px; text-align: left; border-bottom: 2px solid var(--text); }
.lb-table th:last-child, .lb-table td:last-child { text-align: right; }
.lb-table th:nth-child(3), .lb-table td:nth-child(3) { text-align: center; }
.lb-table td { padding: 14px 0; border-bottom: 1px solid var(--border-light); vertical-align: top; }
.lb-table tr:last-child td { border-bottom: none; }
.lb-name { font-weight: 600; font-size: 1em; }
.lb-teams { font-size: 0.8em; color: var(--text2); margin-top: 2px; }
.lb-alive { font-weight: 600; }
.lb-prob { font-size: 0.85em; color: var(--accent); font-weight: 500; }
.lb-odds { font-size: 0.8em; color: var(--text2); }
.lb-elim { text-decoration: line-through; color: var(--text3); }
.lb-rank-num { font-family: var(--serif); font-size: 1.2em; color: var(--text3); width: 30px; }
.charity-row td { color: var(--green); }

/* Prize */
.prize-box { display: flex; gap: 1px; background: var(--border); margin-top: 32px; }
.prize-item { flex: 1; background: var(--white); padding: 20px; text-align: center; }
.prize-label { font-size: 0.75em; color: var(--text3); margin-bottom: 6px; }
.prize-value { font-family: var(--serif); font-size: 1.8em; font-weight: 700; line-height: 1; }
.prize-desc { font-size: 0.75em; color: var(--text3); margin-top: 4px; }
.prize-currently { font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-top: 10px; }
.prize-candidate { font-size: 1em; font-weight: 600; color: var(--accent); margin-top: 2px; }
.pot-summary { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; font-size: 0.8em; color: var(--text2); padding: 10px 0; border-top: 1px solid var(--border-light); }
.pot-check { color: var(--green); }

/* Player cards */
.players-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1px; background: var(--border); }
.player-card { background: var(--white); padding: 24px; }
.player-card-name { font-family: var(--serif); font-size: 1.2em; font-weight: 700; margin-bottom: 4px; }
.player-card-meta { font-size: 0.8em; color: var(--text2); margin-bottom: 16px; }
.team-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-top: 1px solid var(--border-light); }
.team-row:first-of-type { border-top: none; }
.team-flag { font-size: 1.1em; }
.team-name { flex: 1; font-size: 0.9em; }
.team-status { font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
.status-alive { color: var(--green); }
.status-eliminated { color: var(--text3); text-decoration: line-through; }
.team-odds-label { font-size: 0.8em; color: var(--text2); }
.prob-bar-mini { width: 48px; height: 3px; background: var(--border); overflow: hidden; }
.prob-bar-mini .fill { height: 100%; background: var(--accent); }
.player-footer { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 0.8em; color: var(--text2); }
.player-footer .val { font-weight: 600; color: var(--accent); }

/* Bracket */
.bracket-scroll { overflow-x: auto; margin: 0 -20px; padding: 0 20px 20px; }
.bracket { display: flex; gap: 32px; min-width: 1100px; }
.round { display: flex; flex-direction: column; gap: 6px; min-width: 190px; }
.round-label { font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); font-weight: 500; margin-bottom: 6px; padding-bottom: 6px; border-bottom: 2px solid var(--text); }
.bk-match { background: var(--white); border: 1px solid var(--border); font-size: 0.82em; }
.bk-match-date { font-size: 0.75em; color: var(--text3); padding: 4px 8px; border-bottom: 1px solid var(--border-light); }
.bk-team { display: flex; align-items: center; gap: 6px; padding: 5px 8px; }
.bk-team + .bk-team { border-top: 1px solid var(--border-light); }
.bk-team .owner { font-size: 0.8em; color: var(--accent); }
.bk-team .score { margin-left: auto; font-weight: 600; }
.bk-team.winner { background: var(--green-bg); }
.bk-final { border: 2px solid var(--text); }

/* Matches */
.match-day { margin-bottom: 32px; }
.match-day-label { font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); font-weight: 500; padding-bottom: 8px; border-bottom: 2px solid var(--text); margin-bottom: 0; }
.match-item { padding: 20px 0; border-bottom: 1px solid var(--border-light); }
.match-item:last-child { border-bottom: none; }
.match-meta { font-size: 0.75em; color: var(--text3); margin-bottom: 8px; display: flex; justify-content: space-between; }
.match-line { display: flex; align-items: center; gap: 12px; font-size: 1.05em; }
.match-line .team { flex: 1; }
.match-line .team:last-child { text-align: right; }
.match-line .vs { font-size: 0.7em; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
.match-owner { font-size: 0.75em; color: var(--accent); font-weight: 500; }
.match-prob { margin-top: 10px; }
.prob-row { display: flex; align-items: center; gap: 8px; }
.prob-bar { flex: 1; height: 4px; background: var(--border); display: flex; overflow: hidden; }
.prob-home { background: var(--accent); height: 100%; }
.prob-draw { background: var(--text3); height: 100%; }
.prob-away { background: var(--accent2); height: 100%; }
.prob-labels { display: flex; justify-content: space-between; font-size: 0.7em; color: var(--text3); margin-top: 4px; }

/* Filter */
.filter-bar { margin-bottom: 24px; }
.filter-bar select { padding: 6px 10px; border: 1px solid var(--border); background: var(--white); color: var(--text); font-size: 0.85em; font-family: var(--sans); }

/* Side Bets */
.bet-form { background: var(--white); border: 1px solid var(--border); padding: 24px; margin-bottom: 32px; }
.bet-form h3 { margin-bottom: 20px; }
.form-row { display: flex; gap: 16px; margin-bottom: 14px; }
.form-group { flex: 1; min-width: 0; }
.form-group label { display: block; font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text3); margin-bottom: 4px; font-weight: 500; }
.form-group select, .form-group input { width: 100%; padding: 8px 10px; border: 1px solid var(--border); background: var(--white); color: var(--text); font-size: 0.9em; font-family: var(--sans); }
.form-group select:focus, .form-group input:focus { outline: none; border-color: var(--text); }
.btn { padding: 10px 24px; border: none; cursor: pointer; font-weight: 600; font-size: 0.85em; font-family: var(--sans); transition: all 0.15s; letter-spacing: 0.02em; }
.btn-primary { background: var(--text); color: var(--white); }
.btn-primary:hover { background: #333; }
.btn-accept { background: var(--green); color: var(--white); padding: 6px 14px; font-size: 0.8em; }
.btn-decline { background: var(--white); color: var(--accent2); border: 1px solid var(--accent2); padding: 6px 14px; font-size: 0.8em; }

.bets-section-label { font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); font-weight: 500; padding-bottom: 8px; border-bottom: 2px solid var(--text); margin-bottom: 0; margin-top: 28px; }
.bet-card { padding: 16px 0; border-bottom: 1px solid var(--border-light); }
.bet-card:last-child { border-bottom: none; }
.bet-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.bet-status { font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
.bet-status.pending { color: var(--gold); }
.bet-status.accepted { color: var(--green); }
.bet-status.settled { color: var(--text3); }
.bet-players { font-size: 0.9em; }
.bet-match-info { font-size: 0.8em; color: var(--text2); margin-top: 2px; }
.bet-stake { font-size: 0.85em; font-weight: 600; color: var(--text); }
.bet-actions { margin-top: 8px; display: flex; gap: 8px; }
.no-bets { padding: 40px 0; text-align: center; color: var(--text3); font-size: 0.9em; }

/* Update bar */
.update-bar { max-width: 720px; margin: 0 auto; padding: 8px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-light); background: var(--bg); }
.update-bar .last-sync { font-size: 0.75em; color: var(--text3); }
.sync-btn { font-size: 0.75em; font-family: var(--sans); font-weight: 500; padding: 4px 12px; border: 1px solid var(--border); background: var(--white); color: var(--text2); cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
.sync-btn:hover { border-color: var(--text); color: var(--text); }
.sync-btn.loading { opacity: 0.6; pointer-events: none; }
.sync-btn .spinner { display: inline-block; width: 10px; height: 10px; border: 1.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.sync-status { font-size: 0.75em; color: var(--green); }
.sync-error { font-size: 0.75em; color: var(--accent2); }

/* Results admin */
.results-panel { background: var(--white); border: 1px solid var(--border); padding: 24px; margin-bottom: 24px; }
.results-panel h3 { margin-bottom: 4px; }
.results-panel .sub { font-size: 0.8em; color: var(--text2); margin-bottom: 16px; }
.result-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border-light); font-size: 0.85em; }
.result-row:last-child { border-bottom: none; }
.result-teams { flex: 1; }
.result-score { display: flex; align-items: center; gap: 4px; }
.result-score input { width: 36px; text-align: center; padding: 4px; border: 1px solid var(--border); font-family: var(--sans); font-size: 0.9em; }
.result-score .dash { color: var(--text3); }
.result-save { font-size: 0.75em; color: var(--accent); cursor: pointer; font-weight: 500; background: none; border: none; font-family: var(--sans); padding: 0 4px; }
.result-saved { font-size: 0.75em; color: var(--green); }

/* Responsive */
@media (max-width: 600px) {
  .header h1 { font-size: 2em; }
  .header { padding: 32px 20px 24px; }
  .nav-item { margin-right: 16px; font-size: 0.8em; padding: 12px 0; }
  .players-grid { grid-template-columns: 1fr; }
  .form-row { flex-direction: column; gap: 10px; }
  .match-line { font-size: 0.95em; }
  .prize-box { flex-direction: column; gap: 1px; }
}
</style>
</head>

function oddsToProb(odds) { return odds ? (100 / (odds / 100 + 1)) : 0; }

function getTeamOwner(teamName) {
  for (const [player, data] of Object.entries(PLAYERS)) {
    const n = data.teams.map(t => t.toLowerCase());
    if (n.includes(teamName.toLowerCase())) return player;
    if (teamName === "Cape Verde" && n.includes("cabo verde")) return player;
    if (teamName === "Ivory Coast" && n.includes("côte d'ivoire")) return player;
  }
  if (CHARITY_TEAMS.some(t => t.toLowerCase() === teamName.toLowerCase())) return "Charity";
  if (teamName === "Ivory Coast" || teamName === "Côte d'Ivoire") return "Charity";
  return null;
}

function getMatchPrediction(home, away) {
  const hOdds = BETTING_ODDS[home] || BETTING_ODDS[Object.keys(BETTING_ODDS).find(k => k.toLowerCase() === home.toLowerCase())] || 100000;
  const aOdds = BETTING_ODDS[away] || BETTING_ODDS[Object.keys(BETTING_ODDS).find(k => k.toLowerCase() === away.toLowerCase())] || 100000;
  const hS = 1 / (hOdds + 1), aS = 1 / (aOdds + 1), tot = hS + aS;
  return { home: Math.round((hS / tot) * 85), draw: 15, away: Math.round((aS / tot) * 85) };
}

function getPlayerGroupStats(teams) {
  let pts = 0, gd = 0;
  teams.forEach(t => {
    const td = TEAM_DATA[t];
    if (td) { pts += td.pts; gd += (td.gf - td.ga); }
  });
  return { pts, gd };
}

function renderLeaderboard() {
  const el = document.getElementById('leaderboard');
  const ENTRY = 10, NUM_PLAYERS = Object.keys(PLAYERS).length;
  const POT = ENTRY * NUM_PLAYERS; // £70

  const stats = Object.entries(PLAYERS).map(([name, data]) => {
    const alive = data.teams.filter(t => TEAM_DATA[t]?.ko);
    const totalProb = alive.reduce((s, t) => s + oddsToProb(BETTING_ODDS[t] || 0), 0);
    const bestOdds = alive.length ? Math.min(...alive.map(t => BETTING_ODDS[t] || 999999)) : 999999;
    const { pts, gd } = getPlayerGroupStats(data.teams);
    return { name, teams: data.teams, alive, totalProb, bestOdds, total: data.teams.length, pts, gd };
  }).sort((a, b) => b.alive.length !== a.alive.length ? b.alive.length - a.alive.length : b.totalProb - a.totalProb);

  // Wooden spoon: fewest teams alive, then lowest group stage pts, then worst GD
  const spoonStats = [...stats].sort((a, b) =>
    a.alive.length !== b.alive.length ? a.alive.length - b.alive.length :
    a.pts !== b.pts ? a.pts - b.pts : a.gd - b.gd
  );
  const spoon = spoonStats[0];

  let html = `<h2>Leaderboard</h2><p class="section-sub">£${ENTRY} entry each &bull; £${POT} total pot</p>`;
  html += '<table class="lb-table"><thead><tr><th></th><th>Player</th><th>Alive</th><th>Win %</th><th>Prize</th></tr></thead><tbody>';

  stats.forEach((p, i) => {
    const isSpoon = p.name === spoon.name;
    let prize = '', prizeStyle = '';
    if (i === 0) { prize = '🥇 £50'; prizeStyle = 'color:var(--gold);font-weight:600'; }
    else if (i === 1) { prize = '🥈 £15'; prizeStyle = 'color:var(--text2);font-weight:600'; }
    else if (isSpoon) { prize = '🥄 £5'; prizeStyle = 'color:var(--accent2);font-weight:600'; }

    html += `<tr>
      <td class="lb-rank-num">${i + 1}</td>
      <td><div class="lb-name">${p.name}</div><div class="lb-teams">${p.teams.map(t => { const td = TEAM_DATA[t]; const isAlive = td?.ko; return isAlive ? (td?.flag || '') + ' ' + t : '<span class="lb-elim">' + (td?.flag || '') + ' ' + t + '</span>'; }).join(' · ')}</div></td>
      <td class="lb-alive" style="text-align:center">${p.alive.length}/${p.total}</td>
      <td><div class="lb-prob">${p.totalProb.toFixed(1)}%</div><div class="lb-odds">Best +${p.bestOdds < 999999 ? p.bestOdds.toLocaleString() : '—'}</div></td>
      <td style="${prizeStyle};white-space:nowrap">${prize}</td>
    </tr>`;
  });

  const charityAlive = CHARITY_TEAMS.filter(t => {
    const td = TEAM_DATA[t] || TEAM_DATA[Object.keys(TEAM_DATA).find(k => k.toLowerCase() === t.toLowerCase())];
    return td?.ko;
  });
  html += `<tr class="charity-row">
    <td class="lb-rank-num"></td>
    <td><div class="lb-name">Charity</div><div class="lb-teams">${CHARITY_TEAMS.map(t => { const key = Object.keys(TEAM_DATA).find(k => k.toLowerCase() === t.toLowerCase()) || t; const td = TEAM_DATA[key]; const isAlive = td?.ko; return isAlive ? (td?.flag || '') + ' ' + t : '<span class="lb-elim">' + (td?.flag || '') + ' ' + t + '</span>'; }).join(' · ')}</div></td>
    <td style="text-align:center" class="lb-alive">${charityAlive.length}/${CHARITY_TEAMS.length}</td>
    <td></td><td></td>
  </tr>`;
  html += '</tbody></table>';

  html += `<div class="prize-box">
    <div class="prize-item">
      <div class="prize-label">🥇 Winner</div>
      <div class="prize-value">£50</div>
      <div class="prize-desc">Team wins the World Cup</div>
      <div class="prize-currently">Currently</div>
      <div class="prize-candidate">${stats[0]?.name}</div>
    </div>
    <div class="prize-item">
      <div class="prize-label">🥈 Runner-up</div>
      <div class="prize-value">£15</div>
      <div class="prize-desc">Team loses the Final</div>
      <div class="prize-currently">Currently</div>
      <div class="prize-candidate">${stats[1]?.name}</div>
    </div>
    <div class="prize-item">
      <div class="prize-label">🥄 Wooden Spoon</div>
      <div class="prize-value">£5</div>
      <div class="prize-desc">Fewest teams, worst GD</div>
      <div class="prize-currently">Currently</div>
      <div class="prize-candidate">${spoon?.name}</div>
    </div>
  </div>
  <div class="pot-summary">
    <span>${NUM_PLAYERS} players × £${ENTRY} = <strong>£${POT} pot</strong></span>
    <span class="pot-check">£50 + £15 + £5 = £${50+15+5} ✓</span>
  </div>`;

  el.innerHTML = html;
}

function renderPlayers() {

  let html = `<h2>Players & Teams</h2><p class="section-sub">Each player's allocated teams and their tournament status</p>`;
  html += '<div class="players-grid">';

  for (const [name, data] of Object.entries(PLAYERS)) {

    html += `<div class="player-card"><div class="player-card-name">${name}</div>`;
    html += `<div class="player-card-meta">${alive.length} of ${data.teams.length} teams in knockout stage</div>`;
    for (const team of data.teams) {
      const td = TEAM_DATA[team];

      const odds = BETTING_ODDS[team];
      const prob = oddsToProb(odds);
      html += `<div class="team-row">
        <span class="team-flag">${td?.flag || '🏳️'}</span>
        <span class="team-name">${team}</span>
        <span class="team-status ${inKO ? 'status-alive' : 'status-eliminated'}">${inKO ? 'In' : 'Out'}</span>

      </div>`;
    }
    html += `<div class="player-footer"><span>Combined win probability</span><span class="val">${totalProb.toFixed(1)}%</span></div></div>`;

  html += `<div class="player-card"><div class="player-card-name" style="color:var(--green)">Charity</div>`;
  html += `<div class="player-card-meta">Unallocated teams</div>`;
  for (const team of CHARITY_TEAMS) {

    html += `<div class="team-row"><span class="team-flag">${td?.flag || '🏳️'}</span><span class="team-name">${team}</span>
      <span class="team-status ${inKO ? 'status-alive' : 'status-eliminated'}">${inKO ? 'In' : 'Out'}</span></div>`;
  }
  html += '</div></div>';
  el.innerHTML = html;
}

function renderMatches() {
  const el = document.getElementById('matches');
  let html = `<h2>Matches</h2><p class="section-sub">Round of 32 fixtures with win probabilities based on tournament odds</p>`;
  html += '<div class="filter-bar"><select id="matchFilter" onchange="renderMatches()"><option value="all">All matches</option>';
  Object.keys(PLAYERS).forEach(p => html += `<option value="${p}">${p}</option>`);
  html += '</select></div>';
  const filter = document.getElementById('matchFilter')?.value || 'all';

  const days = {};
  R32_MATCHES.forEach(m => { if (!days[m.date]) days[m.date] = []; days[m.date].push(m); });

  for (const [day, matches] of Object.entries(days)) {
    const filtered = matches.filter(m => {
      if (filter === 'all') return true;
      return getTeamOwner(m.home) === filter || getTeamOwner(m.away) === filter;
    });
    if (!filtered.length) continue;

    html += `<div class="match-day"><div class="match-day-label">${day}, 2026</div>`;
    for (const m of filtered) {
      const hO = getTeamOwner(m.home), aO = getTeamOwner(m.away);
      const pred = getMatchPrediction(m.home, m.away);
      html += `<div class="match-item">
        <div class="match-meta"><span>${m.time}</span><span>${m.venue}</span></div>
        <div class="match-line">
          <div class="team">${TEAM_DATA[m.home]?.flag || ''} ${m.home} ${hO ? `<span class="match-owner">${hO}</span>` : ''}</div>
          <div class="vs">vs</div>
          <div class="team">${TEAM_DATA[m.away]?.flag || ''} ${m.away} ${aO ? `<span class="match-owner">${aO}</span>` : ''}</div>
        </div>
        <div class="match-prob">
          <div class="prob-bar"><div class="prob-home" style="width:${pred.home}%"></div><div class="prob-draw" style="width:${pred.draw}%"></div><div class="prob-away" style="width:${pred.away}%"></div></div>
          <div class="prob-labels"><span>${pred.home}%</span><span>Draw ${pred.draw}%</span><span>${pred.away}%</span></div>
        </div>
      </div>`;
    }
    html += '</div>';
  }
  el.innerHTML = html;
}

    settled.forEach(b => {
      html += `<div class="bet-card"><div class="bet-top"><span class="bet-status settled">Settled</span><span class="bet-stake">${b.stake}</span></div>
        <div class="bet-players"><strong>${b.from}</strong> vs <strong>${b.to}</strong> · ${b.winner || 'TBD'} wins</div></div>`;
    });
  }
  if (!sideBets.length) html += '<div class="no-bets">No bets placed yet.</div>';
  el.innerHTML = html;
  updatePickOptions();
}

function toggleScoreBet() {
  document.getElementById('scoreGroup').style.display = document.getElementById('betType').value === 'score' ? 'block' : 'none';
  updatePickOptions();
}

function updatePickOptions() {
  const ms = document.getElementById('betMatch'), ps = document.getElementById('betPick'), ts = document.getElementById('betType');
  if (!ms || !ps) return;
  const match = R32_MATCHES.find(m => m.id === parseInt(ms.value));
  if (!match) return;
  ps.innerHTML = ts.value === 'winner'
    ? `<option value="${match.home}">${match.home}</option><option value="Draw">Draw</option><option value="${match.away}">${match.away}</option>`
    : `<option value="${match.home}">${match.home} wins</option><option value="${match.away}">${match.away} wins</option>`;
}

document.addEventListener('change', e => { if (e.target.id === 'betMatch') updatePickOptions(); });

function placeBet() {
  const from = document.getElementById('betFrom').value, to = document.getElementById('betTo').value;
  const matchId = document.getElementById('betMatch').value, type = document.getElementById('betType').value;
  const pick = document.getElementById('betPick').value, stake = document.getElementById('betStake').value;
  const score = document.getElementById('betScore')?.value || '';
  if (!from || !to || !stake) { alert('Please fill in all fields.'); return; }
  if (from === to) { alert('Cannot bet against yourself.'); return; }
  sideBets.push({ from, to, matchId, type, pick, score, stake, status: 'pending', created: new Date().toISOString() });
  saveBets(); renderSideBets();
}

function acceptBet(i) { sideBets[i].status = 'accepted'; saveBets(); renderSideBets(); }
function declineBet(i) { sideBets[i].status = 'declined'; saveBets(); renderSideBets(); }

// ── Results / Sync ────────────────────────────────────────────────
let manualResults = JSON.parse(localStorage.getItem('manualResults') || '{}');
function saveManualResults() { localStorage.setItem('manualResults', JSON.stringify(manualResults)); }

function applyStoredResults() {
  R32_MATCHES.forEach(m => {
    if (manualResults[m.id]) m.result = manualResults[m.id];
  });
}

// ESPN team name → our name mapping
const ESPN_MAP = {
  'South Africa': 'South Africa', 'Canada': 'Canada',
  'Brazil': 'Brazil', 'Japan': 'Japan',
  'Germany': 'Germany', 'Paraguay': 'Paraguay',
  'Netherlands': 'Netherlands', 'Morocco': 'Morocco',
  "Côte d'Ivoire": "Côte d'Ivoire", 'Ivory Coast': "Côte d'Ivoire",
  'Norway': 'Norway', 'France': 'France', 'Sweden': 'Sweden',
  'Mexico': 'Mexico', 'Ecuador': 'Ecuador',
  'England': 'England', 'DR Congo': 'DR Congo', 'Congo DR': 'DR Congo',
  'Belgium': 'Belgium', 'Senegal': 'Senegal',
  'USA': 'USA', 'United States': 'USA',
  'Bosnia and Herzegovina': 'Bosnia and Herzegovina',
  'Bosnia & Herzegovina': 'Bosnia and Herzegovina',
  'Spain': 'Spain', 'Austria': 'Austria',
  'Portugal': 'Portugal', 'Croatia': 'Croatia',
  'Switzerland': 'Switzerland', 'Algeria': 'Algeria',
  'Australia': 'Australia', 'Egypt': 'Egypt',
  'Argentina': 'Argentina', 'Cape Verde': 'Cabo Verde', 'Cabo Verde': 'Cabo Verde',
  'Colombia': 'Colombia', 'Ghana': 'Ghana'
};

async function syncResults() {
  const btn = document.getElementById('syncBtn');
  const status = document.getElementById('syncStatus');
  btn.classList.add('loading');
  btn.innerHTML = '<span class="spinner"></span> Updating…';
  status.innerHTML = '';

  try {
    const res = await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard');
    if (!res.ok) throw new Error('Network error');
    const data = await res.json();
    let updated = 0;

    (data.events || []).forEach(event => {
      const comp = event.competitions?.[0];
      if (!comp) return;
      const status = comp.status?.type;
      if (!status?.completed) return;

      const teams = comp.competitors || [];
      if (teams.length < 2) return;
      const home = ESPN_MAP[teams[0].team?.displayName] || teams[0].team?.displayName;
      const away = ESPN_MAP[teams[1].team?.displayName] || teams[1].team?.displayName;
      const hScore = parseInt(teams[0].score);
      const aScore = parseInt(teams[1].score);
      if (isNaN(hScore) || isNaN(aScore)) return;

      const match = R32_MATCHES.find(m =>
        (m.home === home && m.away === away) ||
        (m.home === away && m.away === home)
      );
      if (match) {
        const result = (match.home === home) ? [hScore, aScore] : [aScore, hScore];
        match.result = result;
        manualResults[match.id] = result;
        updated++;
      }
    });

    saveManualResults();
    const now = new Date();
    document.getElementById('lastSync').textContent = `Last updated ${now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`;
    status.className = 'sync-status';
    status.textContent = updated > 0 ? `${updated} result${updated > 1 ? 's' : ''} updated` : 'No new results';
    const active = document.querySelector('.nav-item.active');
    if (active) renderSection(document.querySelector('.section.active')?.id);
  } catch (e) {
    status.className = 'sync-error';
    status.textContent = 'Sync failed — enter results manually below';
  }

  btn.classList.remove('loading');
  btn.innerHTML = '&#8635; Update Results';
}

function renderAdmin() {
  const el = document.getElementById('admin');
  let html = `<h2>Enter Results</h2><p class="section-sub">Manually enter scores for completed matches — saved in your browser</p>`;
  html += '<div class="results-panel">';
  html += '<div class="results-panel sub">Click "Save" next to each match after entering the score.</div>';

  R32_MATCHES.forEach(m => {
    const r = m.result;
    html += `<div class="result-row">
      <div class="result-teams">${TEAM_DATA[m.home]?.flag || ''} ${m.home} v ${TEAM_DATA[m.away]?.flag || ''} ${m.away} <span style="color:var(--text3);font-size:0.85em">${m.date}</span></div>
      <div class="result-score">
        <input type="number" id="rs_h_${m.id}" min="0" max="20" value="${r ? r[0] : ''}" placeholder="-">
        <span class="dash">–</span>
        <input type="number" id="rs_a_${m.id}" min="0" max="20" value="${r ? r[1] : ''}" placeholder="-">
      </div>
      <button class="result-save" onclick="saveResult(${m.id})">Save</button>
      ${r ? `<span class="result-saved">✓</span>` : ''}
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

function saveResult(matchId) {
  const h = parseInt(document.getElementById(`rs_h_${matchId}`).value);
  const a = parseInt(document.getElementById(`rs_a_${matchId}`).value);
  if (isNaN(h) || isNaN(a)) { alert('Enter both scores'); return; }
  const match = R32_MATCHES.find(m => m.id === matchId);
  if (!match) return;
  match.result = [h, a];
  manualResults[matchId] = [h, a];
  saveManualResults();
  renderAdmin();
  // refresh any visible tab
  const active = document.querySelector('.section.active');
  if (active && active.id !== 'admin') renderSection(active.id);
}

// Load saved results on startup
applyStoredResults();
const lastSync = localStorage.getItem('lastSync');
if (lastSync) document.getElementById('lastSync').textContent = `Last updated ${lastSync}`;

renderLeaderboard();
</script>
